# =============================================
# FIXELO - Production Docker Compose for Coolify
# =============================================
# Coolify handles ingress, domain and TLS.
# Stack: web (Next.js) + db (PostgreSQL) + redis
# =============================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fixelo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fixelo_change_me_in_coolify}
      POSTGRES_DB: ${POSTGRES_DB:-fixelo_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fixelo} -d ${POSTGRES_DB:-fixelo_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://fixelo.app}
    restart: unless-stopped
    environment:
      # ── Runtime (obrigatórias) ──────────────────────────────
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: "postgresql://${POSTGRES_USER:-fixelo}:${POSTGRES_PASSWORD:-fixelo_change_me_in_coolify}@db:5432/${POSTGRES_DB:-fixelo_prod}?schema=public"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://fixelo.app}
      NEXTAUTH_URL_INTERNAL: http://web:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me_generate_with_openssl_rand_base64_32}
      AUTH_TRUST_HOST: "true"
      REDIS_URL: redis://redis:6379
      # ── Integrações opcionais (configure pelo painel /admin) ─
      # SMTP, Stripe, Twilio, S3, VAPID → admin > Settings > Integrations
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 8.8.4.4
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  postgres_data:
  redis_data:
